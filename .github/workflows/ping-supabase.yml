# .github/workflows/ping-supabase.yml
# Mantém o projeto Supabase ativo no plano gratuito.
# Para o CAUC: usa o endpoint do Vercel (sendViaSES) que já tem acesso confirmado ao CSV do Tesouro.
# O Vercel tem IPs residenciais/CDN que não são bloqueados pelo servidor do governo.

name: Ping Supabase

on:
  schedule:
    - cron: '0 7 * * *'   # 7h UTC = 4h Brasília (UTC-3), todos os dias
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Sync CAUC via Vercel + Ping Supabase
        run: |
          echo "🔄 Disparando sync CAUC em $(date -u)"
          echo "   (O Vercel acessa o CSV do Tesouro — IPs do GitHub Actions são bloqueados pelo governo)"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 240 \
            -X GET \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "https://radarsiope.com.br/api/sendViaSES?acao=sync_cauc&force=true")

          HTTP_BODY=$(echo "$RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)

          echo "HTTP status: $HTTP_CODE"
          echo "Resposta: $HTTP_BODY"

          if [ "$HTTP_CODE" = "200" ] && echo "$HTTP_BODY" | grep -q '"ok":true'; then
            echo "✅ Sync CAUC concluído — Supabase ativo em $(date -u)"
          elif [ "$HTTP_CODE" = "200" ] && echo "$HTTP_BODY" | grep -q '"skipped":true'; then
            echo "ℹ️  Cache ainda válido (sync ignorado) — Supabase ativo em $(date -u)"
          else
            echo "❌ Falha: HTTP $HTTP_CODE"
            echo "$HTTP_BODY"
            exit 1
          fi
