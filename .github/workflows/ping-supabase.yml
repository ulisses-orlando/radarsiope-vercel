# .github/workflows/ping-supabase.yml
# Mantém o projeto Supabase ativo no plano gratuito.
# Executa a cada 3 dias às 8h UTC — bem dentro da janela de 7 dias do Supabase.

name: Ping Supabase

on:
  schedule:
    - cron: '0 8 */3 * *'
  workflow_dispatch:       # permite disparo manual pelo painel do GitHub se precisar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/vw_municipio_resumo?select=cod_municipio&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP status: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "❌ Ping falhou com status $RESPONSE"
            exit 1
          fi
          echo "✅ Supabase ativo em $(date -u)"
