# .github/workflows/sync-cauc.yml
# Carga diária dos dados do CAUC (Tesouro Nacional) no Supabase.
# Executa às 4h horário de Brasília (7h UTC).
# Garante que o relatório de conformidade sempre use dados atualizados,
# sem latência para o usuário final.

name: Sync CAUC

on:
  schedule:
    - cron: '0 7 * * *'   # 7h UTC = 4h Brasília (UTC-3), todos os dias
  workflow_dispatch:       # permite disparo manual pelo painel do GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar sync CAUC via endpoint Vercel
        run: |
          echo "🔄 Iniciando carga CAUC em $(date -u)"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X GET \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "https://radarsiope.com.br/api/sendViaSES?acao=sync_cauc&force=true")

          HTTP_BODY=$(echo "$RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)

          echo "HTTP status: $HTTP_CODE"
          echo "Resposta: $HTTP_BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Sync CAUC falhou com status $HTTP_CODE"
            exit 1
          fi

          # Verifica se a resposta indica sucesso
          if echo "$HTTP_BODY" | grep -q '"ok":true'; then
            echo "✅ Sync CAUC concluído com sucesso"
          else
            echo "⚠️ Resposta inesperada do servidor:"
            echo "$HTTP_BODY"
            exit 1
          fi
