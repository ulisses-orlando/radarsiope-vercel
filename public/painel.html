<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Radar SIOPE — Área do Assinante</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    /* ─── TEMAS ─────────────────────────────────────────────────────── */
    :root {
      --bg:#f1f5f9; --card:#fff; --card2:#f8fafc; --text:#0f172a;
      --accent:#0284c7; --accent2:#6366f1; --muted:#475569;
      --border:rgba(0,0,0,.08); --shadow:rgba(0,0,0,.08);
      --radius:14px; --font-head:'Syne',sans-serif; --font-body:'Lora',serif;
    }
    [data-theme="escuro"] {
      --bg:#0f172a; --card:#1e293b; --card2:#162032; --text:#f8fafc;
      --accent:#38bdf8; --accent2:#818cf8; --muted:#94a3b8;
      --border:rgba(148,163,184,.14); --shadow:rgba(0,0,0,.4);
    }
    [data-theme="suave"] {
      --bg:#fdf6ee; --card:#fff8f1; --card2:#fff; --text:#2d1f0e;
      --accent:#e07a2f; --accent2:#c0533a; --muted:#8a6a4e;
      --border:rgba(160,100,60,.12); --shadow:rgba(80,40,0,.1);
    }
    [data-theme="minimalista"] {
      --bg:#f9f9f7; --card:#fff; --card2:#fafaf8; --text:#111;
      --accent:#111; --accent2:#555; --muted:#666;
      --border:rgba(0,0,0,.07); --shadow:rgba(0,0,0,.05); --radius:6px;
    }
    [data-theme="exito"] {
      --bg:#021a0f; --card:#052e18; --card2:#042414; --text:#e8fdf0;
      --accent:#22c55e; --accent2:#4ade80; --muted:#86efac;
      --border:rgba(34,197,94,.14); --shadow:rgba(0,0,0,.5);
    }
    [data-theme="aurora"] {
      --bg:#0d0d1a; --card:#13132b; --card2:#0f0f23; --text:#f0eeff;
      --accent:#a78bfa; --accent2:#f472b6; --muted:#c4b5fd;
      --border:rgba(167,139,250,.14); --shadow:rgba(0,0,0,.5);
    }

    /* ─── BASE ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background .3s, color .3s;
      padding-bottom: 80px;
    }

    /* ─── HEADER ────────────────────────────────────────────────────── */
    header {
      background: linear-gradient(135deg,#0A3D62,#1A5276);
      color: #fff;
      padding: 10px 16px 12px;
      position: sticky;
      top: 0;
      z-index: 300;
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .header-brand { display: flex; align-items: center; gap: 9px; }
    .header-brand img { height: 34px; filter: brightness(0) invert(1); flex-shrink: 0; }
    .header-brand-text strong {
      display: block; font-family: var(--font-head); font-size: 13px;
      font-weight: 800; color: #fff; line-height: 1.2;
    }
    .header-brand-text small { display: block; font-size: 10px; color: rgba(255,255,255,.6); }
    .header-actions { display: flex; align-items: center; gap: 6px; }
    #nome-usuario {
      font-family: var(--font-head); font-size: 11px; color: rgba(255,255,255,.8);
      text-align: right; max-width: 130px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .menu-toggle {
      display: none; padding: 7px 12px; border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,.25); background: rgba(255,255,255,.1);
      color: #fff; cursor: pointer; font-family: var(--font-head);
      font-size: 11px; font-weight: 700; touch-action: manipulation;
    }
    .btn-logout {
      padding: 7px 12px; border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,.25); background: rgba(239,68,68,.18);
      color: #fff; cursor: pointer; font-family: var(--font-head);
      font-size: 11px; font-weight: 700; touch-action: manipulation;
      transition: background .15s;
    }
    .btn-logout:hover { background: rgba(239,68,68,.38); }

    /* ─── LAYOUT ────────────────────────────────────────────────────── */
    .container { display: flex; min-height: calc(100vh - 66px); }

    /* ─── NAV ───────────────────────────────────────────────────────── */
    nav {
      width: 230px; flex-shrink: 0; background: var(--card);
      border-right: 1px solid var(--border); padding: 14px 10px;
      display: flex; flex-direction: column; gap: 6px;
      transition: background .3s, border-color .3s;
    }
    .brand {
      font-family: var(--font-head); font-size: 10px; font-weight: 700;
      color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
      padding: 0 8px; margin-bottom: 4px;
    }
    .menu { list-style: none; display: flex; flex-direction: column; gap: 3px; }
    .menu button {
      display: flex; align-items: center; gap: 9px; width: 100%;
      text-align: left; padding: 10px 12px; border-radius: 10px;
      border: none; background: transparent; cursor: pointer;
      color: var(--text); font-family: var(--font-head); font-size: 13px;
      font-weight: 600; letter-spacing: .2px;
      transition: background .15s, color .15s; touch-action: manipulation;
    }
    .menu button:hover { background: rgba(148,163,184,.1); }
    .menu button[aria-current="true"] { background: rgba(2,132,199,.12); color: var(--accent); }
    [data-theme="escuro"] .menu button[aria-current="true"] { background: rgba(56,189,248,.12); }
    [data-theme="exito"]  .menu button[aria-current="true"] { background: rgba(34,197,94,.12); }
    [data-theme="aurora"] .menu button[aria-current="true"] { background: rgba(167,139,250,.12); }
    [data-theme="suave"]  .menu button[aria-current="true"] { background: rgba(224,122,47,.1); }
    .nav-footer {
      margin-top: auto; padding: 0 8px;
      font-family: var(--font-head); font-size: 10px; color: var(--muted);
    }

    /* ─── MAIN ──────────────────────────────────────────────────────── */
    main { flex: 1; padding: 18px 14px; min-width: 0; }

    /* ─── SECTIONS ──────────────────────────────────────────────────── */
    .section {
      display: none; background: var(--card); padding: 20px;
      border-radius: var(--radius); border: 1px solid var(--border);
      box-shadow: 0 4px 20px var(--shadow);
      animation: slideUp .3s ease;
    }
    .section.active { display: block; }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .section h2 {
      margin: 0 0 18px; color: var(--accent); font-family: var(--font-head);
      font-size: .95rem; font-weight: 800; letter-spacing: .6px;
      text-transform: uppercase; padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    /* ─── ASSINATURA CARD ───────────────────────────────────────────── */
    .assinatura-card {
      border: 1px solid var(--border);
      border-left: 4px solid var(--st-cor, var(--accent));
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
      background: var(--card2);
    }
    .assinatura-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 12px; margin-bottom: 10px;
    }
    .assinatura-plano {
      font-family: var(--font-head); font-size: 15px;
      font-weight: 800; color: var(--text);
    }
    .assinatura-ciclo { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .assinatura-status {
      font-family: var(--font-head); font-size: 12px;
      font-weight: 700; white-space: nowrap;
    }
    .assinatura-datas {
      display: flex; gap: 16px; flex-wrap: wrap;
      font-size: 12px; color: var(--muted); margin-bottom: 10px;
    }
    .assinatura-datas span strong { color: var(--text); }

    /* Features */
    .features-lista {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-bottom: 12px;
    }
    .feature-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(2,132,199,.08); color: var(--accent);
      border: 1px solid rgba(2,132,199,.2);
      border-radius: 20px; padding: 3px 10px;
      font-family: var(--font-head); font-size: 11px; font-weight: 700;
    }
    [data-theme="exito"]  .feature-badge { background: rgba(34,197,94,.08); color: var(--accent); border-color: rgba(34,197,94,.2); }
    [data-theme="aurora"] .feature-badge { background: rgba(167,139,250,.08); color: var(--accent); border-color: rgba(167,139,250,.2); }

    /* Pagamentos dentro da assinatura */
    .pagamentos-lista {
      margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px;
    }
    .pagamentos-titulo {
      font-family: var(--font-head); font-size: 11px; font-weight: 700;
      color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 8px;
    }
    .pagamento-row {
      display: flex; justify-content: space-between; align-items: center;
      gap: 8px; padding: 6px 0;
      border-bottom: 1px dashed var(--border);
      font-size: 12px;
    }
    .pagamento-row:last-child { border-bottom: none; }

    /* ─── NEWSLETTER CARDS ──────────────────────────────────────────── */
    .nl-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .nl-card {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px; display: flex;
      flex-direction: column; gap: 10px;
      transition: transform .18s, box-shadow .18s;
    }
    .nl-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }
    .nl-card-expirado { opacity: .6; }
    .nl-card-edicao {
      font-family: var(--font-head); font-size: 10px; font-weight: 700;
      color: var(--accent); text-transform: uppercase; letter-spacing: .5px;
    }
    .nl-card-titulo {
      font-family: var(--font-head); font-size: 13px; font-weight: 700;
      color: var(--text); line-height: 1.3;
    }
    .nl-card-data { font-size: 11px; color: var(--muted); }
    .nl-card-footer { margin-top: auto; }
    .btn-ver-nl {
      display: inline-block; padding: 7px 14px; border-radius: 8px;
      background: var(--accent); color: #fff; text-decoration: none;
      font-family: var(--font-head); font-weight: 700; font-size: 12px;
      transition: opacity .15s; touch-action: manipulation;
    }
    .btn-ver-nl:hover { opacity: .85; }
    .nl-badge-expirado {
      font-size: 11px; color: var(--muted);
      font-family: var(--font-head);
    }

    /* ─── SUPORTE / SOLICITAÇÕES ────────────────────────────────────── */
    .form-row { display: flex; flex-direction: column; gap: 5px; max-width: 640px; margin-bottom: 12px; }
    label {
      display: block; font-family: var(--font-head); font-weight: 700;
      font-size: 11px; color: var(--text); letter-spacing: .3px;
    }
    input, select, textarea {
      width: 100%; padding: 9px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--card2);
      color: var(--text); font-size: .9rem; font-family: var(--font-body);
      outline: none; transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    .actions { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
    .btn-primary {
      padding: 10px 18px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff; font-family: var(--font-head);
      font-weight: 700; font-size: 13px; cursor: pointer;
      touch-action: manipulation; transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .85; }

    #filtros-solicitacoes {
      display: flex; gap: 6px; flex-wrap: wrap; margin: 14px 0 10px;
    }
    #filtros-solicitacoes button {
      padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--card2); color: var(--text); font-family: var(--font-head);
      font-size: 11px; font-weight: 700; cursor: pointer; transition: .15s;
    }
    #filtros-solicitacoes button:hover,
    #filtros-solicitacoes button.ativo {
      background: var(--accent); color: #fff; border-color: transparent;
    }

    .solicitacao-item {
      border: 1px solid var(--border);
      border-left: 4px solid var(--st-cor, var(--muted));
      border-radius: 10px; padding: 12px 14px;
      margin-bottom: 10px; background: var(--card2);
    }
    .solicitacao-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 6px;
    }
    .solicitacao-tipo {
      font-family: var(--font-head); font-size: 12px;
      font-weight: 700; color: var(--text); text-transform: capitalize;
    }
    .solicitacao-status { font-family: var(--font-head); font-size: 12px; font-weight: 700; }
    .solicitacao-desc { font-size: 13px; color: var(--text); line-height: 1.5; margin-bottom: 6px; }
    .solicitacao-resposta {
      background: var(--card); border-radius: 6px; padding: 8px 10px;
      font-size: 12px; color: var(--muted); margin: 6px 0;
      border-left: 3px solid var(--accent);
    }
    .solicitacao-footer {
      display: flex; justify-content: space-between;
      align-items: center; margin-top: 8px; gap: 8px;
    }
    .solicitacao-meta { font-size: 11px; color: var(--muted); }
    .btn-sm {
      padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--card); color: var(--text); font-size: 11px;
      font-family: var(--font-head); font-weight: 700; cursor: pointer;
      transition: .15s;
    }
    .btn-sm:hover { background: var(--accent); color: #fff; border-color: transparent; }
    .btn-sm-danger:hover { background: #ef4444; }
    .btn-expandir {
      margin-top: 6px; padding: 4px 10px; border-radius: 6px;
      border: 1px solid var(--border); background: transparent;
      color: var(--accent); font-size: 11px; font-family: var(--font-head);
      font-weight: 700; cursor: pointer;
    }

    /* ─── FORMULÁRIOS ───────────────────────────────────────────────── */
    input[readonly] { opacity: .6; cursor: not-allowed; }

    /* ─── ESTADOS ───────────────────────────────────────────────────── */
    .loading { color: var(--muted); font-size: 13px; padding: 8px 0; }
    .erro { color: #ef4444; font-size: 13px; }
    .empty-state {
      text-align: center; padding: 40px 20px; color: var(--muted);
      font-family: var(--font-head); font-size: 13px;
    }

    /* ─── MODAL ─────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: none; align-items: center; justify-content: center; z-index: 1200;
    }
    .modal-overlay.show { display: flex; }
    .modal-content {
      width: 100%; max-width: 500px; background: var(--card);
      color: var(--text); padding: 20px; border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: 0 16px 40px var(--shadow);
    }
    .modal-content h3 { font-family: var(--font-head); color: var(--text); margin-bottom: 12px; }
    .modal-btns { margin-top: 10px; display: flex; justify-content: flex-end; gap: 8px; }
    #fechar-edicao {
      padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--card2); color: var(--text); cursor: pointer;
      font-family: var(--font-head); font-size: 13px;
    }

    /* ─── TEMA BAR ──────────────────────────────────────────────────── */
    .rs-theme-bar {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 6px; background: var(--card);
      border: 1px solid var(--border); border-radius: 40px;
      padding: 6px 14px; box-shadow: 0 8px 32px var(--shadow); z-index: 500;
      transition: background .35s, border-color .35s; white-space: nowrap;
    }
    .rs-theme-bar label {
      font-family: var(--font-head); font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
      margin-right: 4px; user-select: none;
    }
    .rs-theme-dot {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      transition: transform .2s, border-color .2s;
      position: relative; flex-shrink: 0; touch-action: manipulation;
    }
    .rs-theme-dot:hover  { transform: scale(1.25); }
    .rs-theme-dot.ativo  { border-color: var(--text); transform: scale(1.15); }
    .rs-theme-dot[data-t="claro"]       { background: linear-gradient(135deg,#f1f5f9,#0284c7); }
    .rs-theme-dot[data-t="escuro"]      { background: linear-gradient(135deg,#0f172a,#38bdf8); }
    .rs-theme-dot[data-t="suave"]       { background: linear-gradient(135deg,#fdf6ee,#e07a2f); }
    .rs-theme-dot[data-t="minimalista"] { background: linear-gradient(135deg,#f9f9f7,#111); }
    .rs-theme-dot[data-t="exito"]       { background: linear-gradient(135deg,#021a0f,#22c55e); }
    .rs-theme-dot[data-t="aurora"]      { background: linear-gradient(135deg,#0d0d1a,#a78bfa); }
    @media (max-width: 480px) {
      .rs-theme-bar label { display: none; }
      .rs-theme-bar { padding: 6px 10px; gap: 5px; }
    }

    /* ─── RESPONSIVE ────────────────────────────────────────────────── */
    @media (max-width: 900px) {
      nav {
        position: fixed; left: 0; top: 66px; bottom: 0; width: 230px;
        transform: translateX(-110%); transition: transform .22s; z-index: 1100;
        box-shadow: 4px 0 20px var(--shadow); overflow-y: auto;
      }
      nav.open { transform: translateX(0); }
      .menu-toggle { display: inline-flex; }
      main { padding: 12px 10px; }
      .header-brand-text small { display: none; }
    }
    @media (min-width: 901px) { .menu-toggle { display: none; } }
    button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  </style>
</head>

<body>
  <script>
    (function () {
      const t = ['claro','escuro','suave','minimalista','exito','aurora'];
      const v = t.includes(localStorage.getItem('radar-tema')) ? localStorage.getItem('radar-tema') : 'claro';
      document.documentElement.setAttribute('data-theme', v);
    })();
  </script>

  <header>
    <div class="header-top">
      <div class="header-brand">
        <img src="/icons/icon-192x192.png" alt="Radar SIOPE" onerror="this.style.display='none'">
        <div class="header-brand-text">
          <strong>Radar SIOPE</strong>
          <small>Guia Digital — FUNDEB e SIOPE</small>
        </div>
      </div>
      <div class="header-actions">
        <div id="nome-usuario" aria-live="polite">Usuário</div>
        <button id="menu-toggle" class="menu-toggle" aria-expanded="false" aria-controls="main-nav">☰ Menu</button>
        <button id="btn-logout" class="btn-logout">⏏ Sair</button>
      </div>
    </div>
  </header>

  <div class="container">
    <nav id="main-nav" aria-label="Navegação principal">
      <div class="brand">Área do Assinante</div>
      <ul class="menu" role="menu">
        <li><button data-target="bloco-assinaturas"  aria-current="true">📄 Assinaturas</button></li>
        <li><button data-target="bloco-biblioteca">📚 Minhas Newsletters</button></li>
        <li><button data-target="bloco-suporte">💬 Suporte</button></li>
        <li><button data-target="bloco-perfil">⚙️ Perfil</button></li>
      </ul>
      <div class="nav-footer">Radar SIOPE © 2025</div>
    </nav>

    <main>

      <!-- ASSINATURAS + PAGAMENTOS -->
      <section id="bloco-assinaturas" class="section active">
        <h2>📄 Minhas Assinaturas</h2>
        <div id="minhas-assinaturas">Carregando...</div>
      </section>

      <!-- NEWSLETTERS -->
      <section id="bloco-biblioteca" class="section">
        <h2>📚 Minhas Newsletters</h2>
        <div id="biblioteca-tecnica">Carregando...</div>
      </section>

      <!-- SUPORTE -->
      <section id="bloco-suporte" class="section">
        <h2>💬 Suporte</h2>
        <div class="form-row">
          <label for="tipo-suporte">Tipo de solicitação</label>
          <select id="tipo-suporte">
            <option value="treinamento">Treinamento</option>
            <option value="consultoria">Consultoria</option>
            <option value="newsletters">Newsletters</option>
            <option value="sugestao de tema">Sugestão de tema para newsletter</option>
            <option value="cancelamento">Solicitar cancelamento de assinatura</option>
            <option value="outros">Outros</option>
          </select>
        </div>
        <div class="form-row">
          <label for="mensagem-suporte">Descrição</label>
          <textarea id="mensagem-suporte" rows="5" placeholder="Descreva sua solicitação..."></textarea>
        </div>
        <div class="actions">
          <button id="btn-enviar-suporte" class="btn-primary">Enviar solicitação</button>
          <div id="suporte-feedback" style="color:var(--muted);font-size:13px"></div>
        </div>

        <h3 style="margin-top:24px;font-family:var(--font-head);font-size:.88rem;font-weight:700">
          📜 Histórico de solicitações
        </h3>
        <div id="filtros-solicitacoes">
          <button data-filter="todos" class="ativo" onclick="filtrarSolicitacoes('todos')">Todos</button>
          <button data-filter="pendente"  onclick="filtrarSolicitacoes('pendente')">Pendente</button>
          <button data-filter="aberta"    onclick="filtrarSolicitacoes('aberta')">Aberta</button>
          <button data-filter="atendida"  onclick="filtrarSolicitacoes('atendida')">Atendida</button>
          <button data-filter="cancelada" onclick="filtrarSolicitacoes('cancelada')">Cancelada</button>
        </div>
        <div id="historico-solicitacoes"></div>
      </section>

      <!-- PERFIL -->
      <section id="bloco-perfil" class="section">
        <h2>⚙️ Perfil</h2>
        <div class="card" style="background:var(--card2);border:1px solid var(--border);
          border-radius:var(--radius);padding:16px">
          <form id="perfil-form" autocomplete="off" novalidate>
            <div style="display:flex;flex-direction:column;gap:10px;max-width:640px">
              <div class="form-row">
                <label for="perfil-cpf">CPF</label>
                <input id="perfil-cpf" name="cpf" type="text" readonly />
              </div>
              <div class="form-row">
                <label for="perfil-nome">Nome</label>
                <input id="perfil-nome" name="nome" type="text" required />
              </div>
              <div class="form-row">
                <label for="perfil-email">E-mail</label>
                <input id="perfil-email" name="email" type="email" required />
              </div>
              <div class="form-row">
                <label for="perfil-telefone">Telefone</label>
                <input id="perfil-telefone" name="telefone" type="tel" />
              </div>
              <div id="perfil-uf-municipio"></div>
              <div class="form-row">
                <label for="perfil-preferencia">Preferência de contato</label>
                <select id="perfil-preferencia" name="preferencia_contato">
                  <option value="">Selecione...</option>
                  <option value="E-mail">E-mail</option>
                  <option value="WhatsApp">WhatsApp</option>
                  <option value="Ligação">Ligação</option>
                </select>
              </div>
              <div class="form-row">
                <label for="perfil-perfil">Perfil profissional</label>
                <select id="perfil-perfil" name="perfil">
                  <option value="">Selecione...</option>
                  <option value="secretario">Secretário</option>
                  <option value="tecnico">Técnico</option>
                  <option value="contador">Contador</option>
                  <option value="pesquisador">Pesquisador</option>
                  <option value="cacs">CACS</option>
                  <option value="cidadao">Cidadão</option>
                </select>
              </div>
              <div class="form-row">
                <label>Interesses</label>
                <div id="perfil-interesses" style="margin-top:4px"></div>
              </div>
              <div class="actions">
                <button id="perfil-salvar" type="button" class="btn-primary">Salvar</button>
                <div id="perfil-status" style="color:var(--muted);font-size:13px"></div>
              </div>
            </div>
          </form>
        </div>
      </section>

    </main>
  </div>

  <!-- Modal edição de solicitação -->
  <div id="modal-editar-solicitacao" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-content">
      <h3>✏️ Editar Solicitação</h3>
      <label for="nova-descricao">Nova descrição</label>
      <textarea id="nova-descricao" rows="4" style="margin-top:6px"></textarea>
      <div class="modal-btns">
        <button id="salvar-edicao" class="btn-primary">💾 Salvar</button>
        <button id="fechar-edicao">❌ Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Barra de temas -->
  <div class="rs-theme-bar" role="group" aria-label="Seletor de tema">
    <label>Tema</label>
    <div class="rs-theme-dot" data-t="claro"       title="Claro"       onclick="setPainelTheme('claro')"></div>
    <div class="rs-theme-dot" data-t="escuro"      title="Escuro"      onclick="setPainelTheme('escuro')"></div>
    <div class="rs-theme-dot" data-t="suave"       title="Suave"       onclick="setPainelTheme('suave')"></div>
    <div class="rs-theme-dot" data-t="minimalista" title="Minimalista" onclick="setPainelTheme('minimalista')"></div>
    <div class="rs-theme-dot" data-t="exito"       title="Êxito"       onclick="setPainelTheme('exito')"></div>
    <div class="rs-theme-dot" data-t="aurora"      title="Aurora"      onclick="setPainelTheme('aurora')"></div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="js/firebase-init.js"></script>

  <script>
    (function () {
      const KEY = 'radar-tema';
      const TEMAS = ['claro','escuro','suave','minimalista','exito','aurora'];

      function aplicarTema(tema) {
        if (!TEMAS.includes(tema)) tema = 'claro';
        document.body.setAttribute('data-theme', tema);
        document.documentElement.setAttribute('data-theme', tema);
        document.querySelectorAll('.rs-theme-dot').forEach(d =>
          d.classList.toggle('ativo', d.dataset.t === tema));
      }

      window.setPainelTheme = function (tema) {
        aplicarTema(tema); localStorage.setItem(KEY, tema);
      };

      document.addEventListener('DOMContentLoaded', () => {
        aplicarTema(localStorage.getItem(KEY) || 'claro');
      });

      /* Navegação */
      const menu = document.querySelectorAll('.menu button[data-target]');
      const sections = document.querySelectorAll('.section');
      const menuToggle = document.getElementById('menu-toggle');
      const nav = document.getElementById('main-nav');

      function showSection(id, pushState = true) {
        sections.forEach(s => s.classList.toggle('active', s.id === id));
        menu.forEach(btn =>
          btn.setAttribute('aria-current', btn.dataset.target === id ? 'true' : 'false'));
        if (pushState) history.replaceState(null, '', '#' + id);
        if (window.innerWidth <= 900) {
          nav.classList.remove('open');
          menuToggle?.setAttribute('aria-expanded', 'false');
        }
      }

      menu.forEach(btn => btn.addEventListener('click', () => showSection(btn.dataset.target)));

      document.addEventListener('DOMContentLoaded', () => {
        const hash = location.hash.replace('#', '');
        const initial = hash && document.getElementById(hash) ? hash : 'bloco-assinaturas';
        showSection(initial, false);

        /* Logout */
        document.getElementById('btn-logout').addEventListener('click', () => {
          localStorage.removeItem('usuarioLogado');
          window.location.href = 'login.html';
        });
      });

      menuToggle?.addEventListener('click', () => {
        const open = nav.classList.toggle('open');
        menuToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      });

      /* Modal */
      document.getElementById('fechar-edicao').addEventListener('click', () =>
        document.getElementById('modal-editar-solicitacao').classList.remove('show'));
      document.getElementById('salvar-edicao').addEventListener('click', () => {
        if (typeof salvarEdicaoSolicitacao === 'function') salvarEdicaoSolicitacao();
      });
      document.addEventListener('keydown', e => {
        const modal = document.getElementById('modal-editar-solicitacao');
        if (e.key === 'Escape' && modal.classList.contains('show'))
          modal.classList.remove('show');
      });
    })();
  </script>

  <script src="js/functions.js"></script>
  <script src="js/perfil.js"></script>
  <script src="js/painel.js"></script>
</body>
</html>
